<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Marco Museo de la Comunicación</title>

  <!-- Librería para descargar la imagen -->
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#111;
      color:white;
      font-family:Arial, Helvetica, sans-serif;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      font-size:30px;
      line-height:1.2;
    }

    p{
      text-align:center;
      margin-bottom:25px;
      opacity:0.8;
    }

    /* CONTENEDOR PRINCIPAL */

    .editor{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:20px;
    }

    /* ÁREA DEL MARCO */

    #marco{
      position:relative;
      width:1080px;
      height:1350px;
      background:#000;
      overflow:hidden;
    }

    /* FOTO DEL USUARIO */

    #foto{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:1;
      cursor:grab;
      transform-origin:center;
    }

    /* PNG DEL MARCO */

    #overlay{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:5;
      pointer-events:none;
    }

    /* CONTROLES */

    .controles{
      display:flex;
      flex-wrap:wrap;
      gap:15px;
      justify-content:center;
      align-items:center;
    }

    button{
      background:#ff007f;
      color:white;
      border:none;
      padding:14px 22px;
      border-radius:12px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      opacity:0.9;
    }

    input[type="range"]{
      width:220px;
    }

    .grupo{
      display:flex;
      flex-direction:column;
      gap:6px;
      align-items:center;
    }

    label{
      font-size:14px;
    }

    input[type="file"]{
      color:white;
    }

    /* RESPONSIVE */

    @media(max-width:1200px){

      #marco{
        width:90vw;
        height:112.5vw;
      }

    }

  </style>
</head>

<body>

  <h1>
    Día Internacional de los Museos
  </h1>

  <p>
    Subí tu foto, acomodala dentro del marco y descargá tu imagen.
  </p>

  <div class="editor">

    <!-- MARCO -->

    <div id="marco">

      <!-- FOTO -->

      <img
        id="foto"
        src="https://picsum.photos/1200/1600"
      >

      <!-- PNG SUPERIOR -->

      <img
        id="overlay"
        src="marco.png"
      >

    </div>

    <!-- CONTROLES -->

    <div class="controles">

      <input
        type="file"
        id="subirFoto"
        accept="image/*"
      >

      <div class="grupo">
        <label>Zoom</label>

        <input
          type="range"
          id="zoom"
          min="1"
          max="3"
          step="0.01"
          value="1"
        >
      </div>

      <button id="descargar">
        Descargar imagen
      </button>

      <button id="compartir">
        Compartir
      </button>

    </div>

  </div>

<script>

  const subirFoto = document.getElementById("subirFoto");
  const foto = document.getElementById("foto");
  const zoom = document.getElementById("zoom");
  const descargar = document.getElementById("descargar");
  const compartir = document.getElementById("compartir");
  const marco = document.getElementById("marco");

  let escala = 1;
  let posicionX = 0;
  let posicionY = 0;

  let arrastrando = false;

  let inicioX;
  let inicioY;

  /* SUBIR FOTO */

  subirFoto.addEventListener("change", (evento)=>{

    const archivo = evento.target.files[0];

    if(!archivo) return;

    const lector = new FileReader();

    lector.onload = function(e){

      foto.src = e.target.result;

    }

    lector.readAsDataURL(archivo);

  });

  /* ZOOM */

  zoom.addEventListener("input", ()=>{

    escala = zoom.value;

    actualizarTransformacion();

  });

  /* ARRASTRAR FOTO */

  foto.addEventListener("mousedown", (evento)=>{

    arrastrando = true;

    inicioX = evento.clientX - posicionX;
    inicioY = evento.clientY - posicionY;

    foto.style.cursor = "grabbing";

  });

  window.addEventListener("mouseup", ()=>{

    arrastrando = false;

    foto.style.cursor = "grab";

  });

  window.addEventListener("mousemove", (evento)=>{

    if(!arrastrando) return;

    posicionX = evento.clientX - inicioX;
    posicionY = evento.clientY - inicioY;

    actualizarTransformacion();

  });

  /* ACTUALIZAR POSICIÓN */

  function actualizarTransformacion(){

    foto.style.transform =
      `translate(${posicionX}px, ${posicionY}px) scale(${escala})`;

  }

  /* DESCARGAR */

  descargar.addEventListener("click", ()=>{

    html2canvas(marco, {
      useCORS:true
    }).then(canvas=>{

      const enlace = document.createElement("a");

      enlace.download = "museo-comunicacion.png";

      enlace.href = canvas.toDataURL("image/png");

      enlace.click();

    });

  });

  /* COMPARTIR */

  compartir.addEventListener("click", async ()=>{

    try{

      const canvas = await html2canvas(marco);

      canvas.toBlob(async(blob)=>{

        const archivo = new File(
          [blob],
          "marco-museo.png",
          {
            type:"image/png"
          }
        );

        if(navigator.canShare){

          await navigator.share({
            files:[archivo],
            title:"Día Internacional de los Museos",
            text:"Democracia, periodismo y participación"
          });

        }else{

          alert("Tu navegador no permite compartir automáticamente.");

        }

      });

    }catch(error){

      console.log(error);

    }

  });

</script>

</body>
</html>
